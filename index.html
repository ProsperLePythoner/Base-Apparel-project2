<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" sizes="32x32" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=school">
  <!-- <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=school" />
  -->
  <title>Base Apparel coming soon page</title>
</head>
<body>

  <main id="card">

    <div class="image-side">
      <img src="hero-desktop.jpg" alt="Model showcasing Base Apparel's new spring collection">
    </div>

    <div class="content-side">
      <img src="logo.svg" alt="Base Apparel logo">
      <h1><span>We're</span> coming soon</h1>

      <p>Hello fellow shoppers! We're currently building our new fashion store. 
         Add your email below to stay up-to-date with announcements and our launch deals.</p>

      <div class="input-group">
        <input type="email" placeholder="Email Address">

        <button type="submit">
          <img src="icon-arrow.svg" alt="submit" style="width: 10px;">
        </button>
      </div>
      <p class="error-message">! Please enter a valid email address</p>

    </div>

  </main>

  <footer>
    <p class="attribution">
      Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
      Coded by <a href="#">Your Name Here</a>.
    </p>
  </footer>

  <script>
  const button = document.querySelector('button');
  const input = document.querySelector('input[type="email"]');
  const card = document.querySelector('main');
  const errorMessage = document.querySelector('.error-message');

  button.addEventListener('click', () => {
    const isValidEmail = input.value.includes('@') && input.value.includes('.');

    if (!isValidEmail) {
      // show the error state
      input.classList.add('error');
      errorMessage.classList.add('visible');

      // wiggle
      card.classList.add('wiggle');
      card.addEventListener('animationend', () => {
        card.classList.remove('wiggle');
      }, { once: true });

    } else {
      // clear the error state on success
      input.classList.remove('error');
      errorMessage.classList.remove('visible');
    }
  });

  // also clear the error as soon as they start retyping
  input.addEventListener('input', () => {
    input.classList.remove('error');
    errorMessage.classList.remove('visible');
  });
</script>
</body>
</html>
